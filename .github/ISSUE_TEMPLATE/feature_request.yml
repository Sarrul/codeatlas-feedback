name: 💡 Feature Request
description: Suggest an idea to improve CodeAtlas
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your suggestion.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve? / Ямар асуудлыг шийдэх вэ?
      description: Describe the problem clearly. / Асуудлыг тодорхой тайлбарлана уу.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution / Санал болгож буй шийдэл
      description: How should it work? / Яаж ажиллах ёстой гэж бодож байна?
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context / Нэмэлт мэдээлэл
      description: Screenshots or extra explanation (optional) / Зураг эсвэл нэмэлт тайлбар (заавал биш)